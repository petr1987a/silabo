<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Оптимизация для мобильных устройств: запрет зума при двойном тапе -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Светофорчик</title>
    
    <!-- Подключение библиотеки Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* --- Базовые сбросы --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
            background-color: var(--container-bg);
            border-radius: var(--container-radius);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        #mainPageTitle {
            text-align: center;
            width: 100%;
            margin: 5px 0 15px 0;
            font-size: 1.4rem;
        }

        /* --- Светофор --- */
        .traffic-light-display {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background-color: var(--container-bg);
            border: 1px solid var(--textarea-border);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(100, 100, 100, 0.2);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            cursor: pointer;
        }

        .traffic-light-display .light {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0 8px;
            position: relative;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.2), inset 0 -5px 15px rgba(0,0,0,0.3);
        }

        .light::after {
            content: '';
            position: absolute;
            top: 10%; left: 10%;
            width: 80%; height: 80%;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 50%, rgba(0,0,0,0.1) 100%);
        }

        @keyframes glow { 0% { filter: brightness(1); } 50% { filter: brightness(1.2); } 100% { filter: brightness(1); } }
        .red-light.active { background: radial-gradient(circle, #ff4444 0%, #cc0000 70%, #8b0000 100%); box-shadow: 0 0 30px #ff000066; animation: glow 1.5s infinite; }
        .yellow-light.active { background: radial-gradient(circle, #ffff00 0%, #ffd700 70%, #daa520 100%); box-shadow: 0 0 30px #ffff0066; animation: glow 1.8s infinite; }
        .green-light.active { background: radial-gradient(circle, #00ff00 0%, #00cc00 70%, #008000 100%); box-shadow: 0 0 30px #00ff0066; animation: glow 2s infinite; }
        
        .dark-theme .light:not(.active) { background: radial-gradient(circle, #3a3a3a 0%, #2a2a2a 70%, #1a1a1a 100%); }
        .light-theme .light:not(.active) { background: radial-gradient(circle, #e0e0e0 0%, #c0c0c0 70%, #a0a0a0 100%); }

        #trafficLightComment {
            text-align: center;
            margin: 10px auto 15px auto;
            padding: 0 10px;
            font-style: italic;
            color: var(--footer-color);
            font-size: 0.95rem;
        }

        /* --- Единый блок ввода и результата --- */
        .editor-container {
            width: 100%;
            min-height: 200px;
            margin-bottom: 15px;
            border: 2px solid var(--textarea-border);
            border-radius: 5px;
            background-color: var(--textarea-bg);
            transition: border-color 0.3s;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 100%;
            min-height: 200px;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--textarea-color);
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            outline: none;
        }

        #resultDisplay {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            color: var(--textarea-color);
            font-size: 1rem;
            display: none; /* Скрыто по умолчанию */
            cursor: text;
        }

        .poem-line {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2px;
            border-bottom: 1px dashed rgba(128, 128, 128, 0.2);
        }

        .poem-line .text {
            flex: 1;
            word-break: break-word;
            padding-right: 10px;
        }

        .syllable-count {
            color: var(--accent-color);
            font-weight: 900;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            min-width: 25px;
            text-align: right;
            flex-shrink: 0;
        }

        /* --- Кнопки --- */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 10px; 
            flex-wrap: wrap;
            width: 100%;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--button-text-color);
            background-color: var(--button-bg);
            border: 1px solid var(--button-border);
            border-radius: 5px;
            cursor: pointer;
            flex: 1;
            min-width: 100px;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.96); }

        /* --- Список стихов --- */
        #savedPoemsList {
            list-style-type: none;
            padding: 0;
            width: 100%;
            margin: 0;
        }

        #savedPoemsList li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px;
            margin: 8px 0;
            background-color: var(--container-bg);
            border: 1px solid var(--textarea-border);
            border-radius: 5px;
        }

        #savedPoemsList li span {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.95rem;
        }

        #savedPoemsList li div { display: flex; gap: 5px; }
        #savedPoemsList li button { padding: 6px 12px; flex: none; font-size: 1rem; min-width: auto; }

        footer {
            margin-top: 30px;
            font-style: italic;
            text-align: center;
            font-size: 0.8em;
            color: var(--footer-color);
        }

        /* --- Темы --- */
        .dark-theme {
            --container-bg: #2c2c2c;
            --container-radius: 8px;
            --textarea-border: #ff5555;
            --textarea-bg: #111;
            --textarea-color: #e0e0e0;
            --button-text-color: #e0e0e0;
            --button-bg: #dc3545;
            --button-border: #a71d2a;
            --footer-color: #777;
            --accent-color: #ff4444;
            background-color: #1a1a1a;
            color: #e0e0e0;
        }

        .light-theme {
            --container-bg: #ffffff;
            --container-radius: 8px;
            --textarea-border: #00cc66;
            --textarea-bg: #f9f9f9;
            --textarea-color: #333;
            --button-text-color: #ffffff;
            --button-bg: #28a745; 
            --button-border: #1e7e34;
            --footer-color: #555;
            --accent-color: #00cc66;
            background-color: #f4f7f6;
            color: #333;
        }

        #inputText::placeholder { opacity: 0.6; color: var(--textarea-color); }
    </style>
</head>
<body class="dark-theme">
    <div class="container">
        <h1 id="mainPageTitle">Светофорчик</h1>

        <!-- Светофор -->
        <div id="trafficLightContainer" class="traffic-light-display">
            <span class="light red-light" id="lightRed"></span>
            <span class="light yellow-light" id="lightYellow"></span>
            <span class="light green-light" id="lightGreen"></span>
        </div>
        <div id="trafficLightComment">Светофор ждёт ваших творений... ✨</div>

        <!-- Единый блок: Ввод и Результат -->
        <div class="editor-container">
            <textarea id="inputText" placeholder="Начните писать стихи здесь..."></textarea>
            <div id="resultDisplay" title="Нажмите, чтобы редактировать"></div>
        </div>

        <div class="button-container">
            <button id="mainActionBtn">ПОСЧИТАТЬ 🚀</button>
            <button id="clearBtn">В ТОПКУ 🔥</button>
            <button id="saveBtn">В АРХИВ 🗄️</button>
        </div>
        
        <ul id="savedPoemsList"></ul>
        
        <footer> Сделано с ❤️ для поэтов Лены и Светы! </footer>
    </div>

    <script>
        // --- Инициализация Telegram Web App ---
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        function hapticFeedback(style = 'light') {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(style);
        }

        // Синхронизация темы
        function syncTelegramTheme() {
            if (tg.colorScheme) {
                const isDark = tg.colorScheme === 'dark';
                document.body.className = isDark ? 'dark-theme' : 'light-theme';
            }
        }
        tg.onEvent('themeChanged', syncTelegramTheme);

        // --- Настройки строгости ---
        const STRICTNESS = {
            dark: { yellowDev: 1, redDev: 2, yellowThresh: 1, redThresh: 1 },
            light: { yellowDev: 4, redDev: 6, yellowThresh: 6, redThresh: 4 }
        };

        const comments = {
            dark: {
                green: ["Допущено к публикации. 📄✅", "Робот одобряет. 🤖", "Идеальный ритм. 💀"],
                yellow: ["Ритм споткнулся! 🐞", "Словно робот с севшей батареей. 🔋", "Ошибка гармонии. ❌"],
                red: ["Уничтожить. Стереть. ☠️", "Слоговой апокалипсис. 💥", "Даже ИИ в шоке. 🤖"],
                default: ["Добро пожаловать в цифровой ад. 🔥", "Тёмная сторона ждёт. 🌑"]
            },
            light: {
                green: ["Прекрасный ритм! 🌸", "Муза улыбается! 😊", "Идеально! ✨"],
                yellow: ["Можно лучше, но неплохо 🌼", "Маленькие огрехи 💛", "Почти получилось! 🌈"],
                red: ["Ой, что-то разладилось... 🌧️", "Ритм заблудился 🐾", "Попробуем ещё? 🌱"],
                default: ["Светлый режим. Творите! ☀️"]
            }
        };

        // --- Элементы ---
        const textArea = document.getElementById('inputText');
        const resultDisplay = document.getElementById('resultDisplay');
        const mainActionBtn = document.getElementById('mainActionBtn');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');
        const savedPoemsList = document.getElementById('savedPoemsList');
        const trafficLightCommentDiv = document.getElementById('trafficLightComment');
        
        const vowels = "аеёиоуыэюяАЕЁИОУЫЭЮЯ";
        let isEditMode = true; // Состояние интерфейса

        // --- Логика хранилища (Telegram Cloud + LocalStorage) ---
        // Асинхронная загрузка
        function loadData(callback) {
            if (tg.initDataUnsafe && tg.CloudStorage) {
                tg.CloudStorage.getItem("savedPoems", (err, value) => {
                    let data = [];
                    if (!err && value) {
                        try { data = JSON.parse(value); } catch(e){}
                    }
                    callback(data);
                });
            } else {
                let data = JSON.parse(localStorage.getItem("savedPoems")) || [];
                callback(data);
            }
        }

        // Асинхронное сохранение
        function saveData(data, callback) {
            const dataStr = JSON.stringify(data);
            if (tg.initDataUnsafe && tg.CloudStorage) {
                tg.CloudStorage.setItem("savedPoems", dataStr, (err, success) => {
                    if (callback) callback(success);
                });
            } else {
                localStorage.setItem("savedPoems", dataStr);
                if (callback) callback(true);
            }
        }

        // --- Основные функции ---
        function countSyllables(line) {
            let count = 0;
            for (let char of line.toLowerCase()) {
                if (vowels.includes(char)) count++;
            }
            return count || (line.trim().length > 0 ? 1 : 0);
        }

        function getDominantCount(counts) {
            if (!counts || counts.length === 0) return null;
            if (counts.length === 1) return counts[0];

            const map = new Map();
            let maxFreq = 0, dominant = null;

            for (let c of counts) {
                if (c === 0 && counts.length > 1) continue; 
                map.set(c, (map.get(c) || 0) + 1);
            }
            
            if (Array.from(map.keys()).every(k => k === 0)) return 0;

            for (let [c, freq] of map) {
                if (c === 0 && map.size > 1) continue; 
                if (freq > maxFreq) { maxFreq = freq; dominant = c; } 
                else if (freq === maxFreq && (dominant === null || c > dominant)) { dominant = c; }
            }
            
            if (maxFreq <= counts.length / 2 && new Set(counts.filter(c => c > 0)).size > 2) return null;
            return dominant;
        }

        function updateTrafficLight(counts) {
            document.getElementById('lightRed').classList.remove('active');
            document.getElementById('lightYellow').classList.remove('active');
            document.getElementById('lightGreen').classList.remove('active');

            if (counts.length === 0) {
                const isDark = document.body.classList.contains('dark-theme');
                trafficLightCommentDiv.textContent = comments[isDark ? 'dark' : 'light'].default[0];
                return;
            }

            const isDark = document.body.classList.contains('dark-theme');
            const rules = isDark ? STRICTNESS.dark : STRICTNESS.light;
            const texts = isDark ? comments.dark : comments.light;

            const dominant = getDominantCount(counts);
            let yellow = 0, red = 0;

            if (dominant === null && counts.length > 1) {
                red = counts.length;
            } else if (dominant !== null) {
                for (let c of counts) {
                    const dev = Math.abs(c - dominant);
                    if (dev >= rules.redDev) red++;
                    else if (dev >= rules.yellowDev) yellow++;
                }
            }

            if (red >= rules.redThresh) {
                document.getElementById('lightRed').classList.add('active');
                trafficLightCommentDiv.textContent = texts.red[Math.floor(Math.random() * texts.red.length)];
                hapticFeedback('heavy');
            } else if (yellow >= rules.yellowThresh) {
                document.getElementById('lightYellow').classList.add('active');
                trafficLightCommentDiv.textContent = texts.yellow[Math.floor(Math.random() * texts.yellow.length)];
                hapticFeedback('medium');
            } else {
                document.getElementById('lightGreen').classList.add('active');
                trafficLightCommentDiv.textContent = texts.green[Math.floor(Math.random() * texts.green.length)];
                hapticFeedback('light');
            }
        }

        // --- Переключение режимов (Ввод <-> Результат) ---
        function toggleMode() {
            hapticFeedback('light');
            if (isEditMode) {
                // Переход в режим просмотра (Анализ)
                const text = textArea.value;
                if (!text.trim()) return;

                const lines = text.split('\n');
                let html = '';
                let counts = [];

                lines.forEach(line => {
                    const c = countSyllables(line);
                    if (line.trim() !== "" || c > 0) counts.push(c);
                    
                    if (line.trim() === "" && c === 0) {
                        html += `<div class="poem-line"><span class="text"><br></span><span class="count"></span></div>`;
                    } else {
                        html += `<div class="poem-line"><span class="text">${line}</span><span class="count">${c}</span></div>`;
                    }
                });

                resultDisplay.innerHTML = html;
                textArea.style.display = 'none';
                resultDisplay.style.display = 'block';
                
                const isDark = document.body.classList.contains('dark-theme');
                mainActionBtn.textContent = isDark ? 'РЕДАКТИРОВАТЬ ✏️' : 'Редактировать ✏️';
                
                updateTrafficLight(counts);
                isEditMode = false;
            } else {
                // Переход в режим редактирования
                resultDisplay.style.display = 'none';
                textArea.style.display = 'block';
                textArea.focus();
                
                const isDark = document.body.classList.contains('dark-theme');
                mainActionBtn.textContent = isDark ? 'ПОСЧИТАТЬ 🚀' : 'Посчитать 🚀';
                isEditMode = true;
            }
        }

        // Клик по результату возвращает к редактированию
        resultDisplay.addEventListener('click', toggleMode);

        function clearAll() {
            hapticFeedback('medium');
            textArea.value = "";
            if (!isEditMode) toggleMode(); // Вернуться в редактор
            updateTrafficLight([]);
        }

        // --- Работа со списком ---
        function renderList(poems) {
            savedPoemsList.innerHTML = "";
            poems.forEach((poem, index) => {
                const li = document.createElement("li");
                const preview = poem.length > 30 ? poem.substring(0, 30) + "..." : poem;
                li.innerHTML = `
                    <span>${preview.replace(/\n/g, ' ')}</span> 
                    <div>
                        <button onclick="loadPoem(${index})">📖</button>
                        <button onclick="deletePoem(${index})">🗑️</button>
                    </div>`;
                savedPoemsList.appendChild(li);
            });
        }

        function refreshList() {
            loadData(renderList);
        }

        function saveCurrent() {
            hapticFeedback('success');
            const text = textArea.value.trim();
            if (!text) return;

            loadData((poems) => {
                poems.unshift(text);
                saveData(poems, () => {
                    refreshList();
                    trafficLightCommentDiv.textContent = "Стих сохранён в архив! 🗄️";
                });
            });
        }

        window.loadPoem = function(index) {
            hapticFeedback('light');
            loadData((poems) => {
                if (poems[index]) {
                    textArea.value = poems[index];
                    if (isEditMode) toggleMode(); // Сразу показываем результат
                    else {
                        isEditMode = true; // Сброс состояния чтобы toggleMode сработал корректно
                        toggleMode();
                    }
                }
            });
        }

        window.deletePoem = function(index) {
            hapticFeedback('warning');
            const confirmDel = tg.showConfirm ? tg.showConfirm("Удалить стих?", (res) => {
                if(res) execDel();
            }) : confirm("Удалить стих?");
            
            if(confirmDel === true) execDel();

            function execDel() {
                loadData((poems) => {
                    poems.splice(index, 1);
                    saveData(poems, refreshList);
                });
            }
        }

        // --- Смена темы по клику на светофор ---
        document.getElementById('trafficLightContainer').addEventListener('click', () => {
            hapticFeedback('rigid');
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
            
            const isDark = document.body.classList.contains('dark-theme');
            mainActionBtn.textContent = isEditMode 
                ? (isDark ? 'ПОСЧИТАТЬ 🚀' : 'Посчитать 🚀') 
                : (isDark ? 'РЕДАКТИРОВАТЬ ✏️' : 'Редактировать ✏️');
            clearBtn.textContent = isDark ? 'В ТОПКУ 🔥' : 'Очистить';
            saveBtn.textContent = isDark ? 'В АРХИВ 🗄️' : 'Сохранить';
            
            // Заставляем светофор мигнуть и обновиться
            document.getElementById('lightRed').classList.add('active');
            document.getElementById('lightYellow').classList.add('active');
            document.getElementById('lightGreen').classList.add('active');
            
            setTimeout(() => {
                if (!isEditMode) {
                    isEditMode = true; toggleMode(); // Пересчет
                } else {
                    updateTrafficLight([]);
                }
            }, 300);
        });

        // --- Инициализация ---
        document.addEventListener('DOMContentLoaded', () => {
            syncTelegramTheme();
            refreshList();
            updateTrafficLight([]);
            
            const isDark = document.body.classList.contains('dark-theme');
            mainActionBtn.textContent = isDark ? 'ПОСЧИТАТЬ 🚀' : 'Посчитать 🚀';
            clearBtn.textContent = isDark ? 'В ТОПКУ 🔥' : 'Очистить';
            saveBtn.textContent = isDark ? 'В АРХИВ 🗄️' : 'Сохранить';
        });

        mainActionBtn.addEventListener('click', toggleMode);
        clearBtn.addEventListener('click', clearAll);
        saveBtn.addEventListener('click', saveCurrent);

    </script>
</body>
</html>
