<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Светофорчик</title>
    
    <!-- Подключение библиотеки Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* --- Базовые сбросы для мобильных --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 10px auto;
            padding: 20px;
            background-color: var(--container-bg);
            border-radius: var(--container-radius);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        /* --- Единый блок для ввода и результата --- */
        .editor-container {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }

        textarea, #resultDisplay {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid var(--textarea-border);
            background-color: var(--textarea-bg);
            color: var(--textarea-color);
            border-radius: 8px;
            font-size: 1.05rem;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            display: block;
        }

        #resultDisplay {
            display: none;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .result-line {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px dashed rgba(128, 128, 128, 0.2);
            padding-bottom: 4px;
            margin-bottom: 6px;
            word-break: break-word;
        }
        
        .result-line:last-child {
            border-bottom: none;
        }

        .syllable-count {
            color: var(--accent-color);
            font-weight: 900;
            text-shadow: 0 2px 3px rgba(0, 0, 0, 0.2);
            margin-left: 10px;
            flex-shrink: 0;
            font-size: 1.1rem;
        }

        button {
            padding: 12px 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--button-text-color);
            background-color: var(--button-bg);
            border: 1px solid var(--button-border);
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            flex: 1;
            text-align: center;
        }

        button:active {
            transform: scale(0.96);
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            gap: 10px; 
            width: 100%;
            margin: 15px 0;
        }

        #trafficLightComment {
            text-align: center;
            margin: 12px auto;
            padding: 0 15px;
            min-height: 45px;
            font-style: italic;
            font-weight: bold;
            color: var(--footer-color);
            transition: color 0.3s;
        }

        .traffic-light-display {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background-color: var(--container-bg);
            border: 1px solid var(--textarea-border);
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(100, 100, 100, 0.2);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            cursor: pointer;
        }

        .light {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0 8px;
            position: relative;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.2), inset 0 -5px 15px rgba(0,0,0,0.3);
        }

        .light::after {
            content: '';
            position: absolute;
            top: 10%; left: 10%;
            width: 80%; height: 80%;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 50%, rgba(0,0,0,0.1) 100%);
        }

        @keyframes glow {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
            100% { filter: brightness(1); }
        }

        .red-light.active { background: radial-gradient(circle, #ff4444 0%, #cc0000 70%, #8b0000 100%); box-shadow: 0 0 30px #ff000066; animation: glow 1.5s infinite; }
        .yellow-light.active { background: radial-gradient(circle, #ffff00 0%, #ffd700 70%, #daa520 100%); box-shadow: 0 0 30px #ffff0066; animation: glow 1.8s infinite; }
        .green-light.active { background: radial-gradient(circle, #00ff00 0%, #00cc00 70%, #008000 100%); box-shadow: 0 0 30px #00ff0066; animation: glow 2s infinite; }

        .dark-theme .light:not(.active) { background: radial-gradient(circle, #3a3a3a 0%, #2a2a2a 70%, #1a1a1a 100%); }
        .light-theme .light:not(.active) { background: radial-gradient(circle, #e0e0e0 0%, #c0c0c0 70%, #a0a0a0 100%); }

        .light.active { animation: power-on 0.3s ease-out; }
        @keyframes power-on {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        footer {
            margin-top: 30px;
            font-style: italic;
            text-align: center;
            font-size: 0.8em;
            color: var(--footer-color);
            transition: color 0.3s;
        }

        /* Темы */
        .dark-theme {
            --container-bg: #2c2c2c;
            --container-radius: 12px;
            --textarea-border: #ff5555;
            --textarea-bg: #1a1a1a;
            --textarea-color: #e0e0e0;
            --button-text-color: #e0e0e0;
            --button-bg: #3a3a3a;
            --button-border: #555;
            --footer-color: #777;
            --accent-color: #ff4444;
            background-color: #111;
            color: #e0e0e0;
        }

        .light-theme {
            --container-bg: #ffffff;
            --container-radius: 12px;
            --textarea-border: #00cc66;
            --textarea-bg: #f9f9f9;
            --textarea-color: #333;
            --button-text-color: #333;
            --button-bg: #e0e0e0; 
            --button-border: #ccc;
            --footer-color: #555;
            --accent-color: #00cc66;
            background-color: #f4f7f6;
            color: #333;
        }

        .dark-theme #countButton { background-color: #8b0000; border-color: #ff4444; color: white;}
        .dark-theme #clearButton { background-color: #444; }
        .dark-theme #saveButton { background-color: #225522; border-color: #00ff00; color: white;}

        .light-theme #countButton { background-color: #28a745; color: white; border-color: #1e7e34;}
        .light-theme #saveButton { background-color: #17a2b8; color: white; border-color: #117a8b;}

        @media (max-width: 480px) {
            .container { padding: 12px; margin: 5px auto;}
            button { padding: 10px 5px; font-size: 0.95rem; }
            .light { width: 45px; height: 45px; }
            #trafficLightComment { font-size: 0.9em; }
        }

        #inputText::placeholder {
            transition: opacity 0.4s ease-in-out;
            color: var(--textarea-color);
            opacity: 0.5;
        }

        #mainPageTitle {
            text-align: center;
            width: 100%;
            margin: 5px 0 15px 0;
            font-size: 1.4rem;
        }

        /* Список сохраненных стихов */
        #savedPoemsList {
            list-style-type: none;
            padding: 0;
            width: 100%;
            margin-top: 20px;
        }

        #savedPoemsList li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px;
            margin: 8px 0;
            background-color: var(--textarea-bg);
            border: 1px solid var(--textarea-border);
            border-radius: 8px;
        }

        #savedPoemsList li span {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.95rem;
        }

        #savedPoemsList li div {
            display: flex;
            gap: 8px;
        }

        #savedPoemsList li button {
            padding: 6px 10px;
            flex: none;
            font-size: 1.2rem;
            background-color: transparent;
            border: 1px solid var(--button-border);
        }
    </style>
</head>
<body class="dark-theme">
    <div class="container">
        <h1 id="mainPageTitle"></h1>

        <!-- Светофор -->
        <div id="trafficLightContainer" class="traffic-light-display">
            <span class="light red-light" id="lightRed"></span>
            <span class="light yellow-light" id="lightYellow"></span>
            <span class="light green-light" id="lightGreen"></span>
        </div>
        <div id="trafficLightComment">Светофор ждёт ваших творений... ✨</div>

        <!-- Единый блок: Ввод текста / Результат -->
        <div class="editor-container">
            <textarea id="inputText" placeholder="Ваш текст здесь..."></textarea>
            <div id="resultDisplay"></div>
        </div>

        <!-- Кнопки управления -->
        <div class="button-container">
            <button id="clearButton">В ТОПКУ 🔥</button>
            <button id="countButton" data-dark="ПОЕХАЛИ 🚀" data-light="Начать 🚀">ПОЕХАЛИ 🚀</button>
            <button id="saveButton">В АРХИВ 🗄️</button>
        </div>
        
        <!-- Архив -->
        <ul id="savedPoemsList"></ul>
        
        <footer> Сделано с ❤️ для поэтов Лены и Светы! </footer>
    </div>

    <script>
        // --- Инициализация Telegram Web App ---
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        // Синхронизация темы
        function syncTelegramTheme() {
            if (tg.colorScheme) {
                if (tg.colorScheme === 'dark') {
                    document.body.classList.remove('light-theme');
                    document.body.classList.add('dark-theme');
                } else {
                    document.body.classList.remove('dark-theme');
                    document.body.classList.add('light-theme');
                }
                updateUIForTheme();
            }
        }
        tg.onEvent('themeChanged', syncTelegramTheme);

        function hapticFeedback(style = 'light') {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(style);
        }

        // --- Настройки строгости светофора ---
        const STRICTNESS_LEVELS = {
            dark: { yellowDeviation: 1, redDeviation: 2, yellowThreshold: 1, redThreshold: 1 },
            light: { yellowDeviation: 4, redDeviation: 6, yellowThreshold: 6, redThreshold: 4 }
        };

        // --- Элементы DOM ---
        const textArea = document.getElementById('inputText');
        const resultDisplay = document.getElementById('resultDisplay');
        const countButton = document.getElementById('countButton');
        const clearButton = document.getElementById('clearButton');
        const saveButton = document.getElementById('saveButton');
        const savedPoemsList = document.getElementById('savedPoemsList');
        const lightRed = document.getElementById('lightRed');
        const lightYellow = document.getElementById('lightYellow');
        const lightGreen = document.getElementById('lightGreen');
        const trafficLightCommentDiv = document.getElementById('trafficLightComment');
        const mainPageTitleElement = document.getElementById('mainPageTitle'); 

        let isEditMode = true; 
        const vowels = "аеёиоуыэюяАЕЁИОУЫЭЮЯ"; 

        // --- Юмор и Комментарии ---
        const comments = {
            dark: {
                green: [
                    "Допущено к публикации. Пока что. 📄✅", 
                    "Робот-надзиратель зевнул. Скучное совершенство. 🤖💤",
                    "Ритм как строевой шаг дронов. Тоска. 💂♂️💀",
                    "Технически безупречно... Как ваш счёт в банке. 💳⚰️",
                    "Алгоритм одобряет. Людям бы так не скучать. 📊🤖"
                ],
                yellow: [
                    "Ритм споткнулся о баг! 🐞💥 Срочно патч!",
                    "Строки пьяны. Отправьте на детоксикацию! 🍷🚫",
                    "Метроном в истерике: '11101000!' 💢🤯",
                    "Словно робот с разряженной батареей. 🔋😴",
                    "Это не баг, это фича... Но лучше исправьте. 🐜✨"
                ],
                red: [
                    "Уничтожить. Стереть. Забыть. ☠️🔥",
                    "Ритм отправился в цифровое забвение. 💀⚰️",
                    "Поздравляю! Вы изобрели анти-поэзию. 🏆☢️",
                    "Серверы плачут кровавыми слезами. 😭🔪",
                    "Код красный: СЛОГОВЫЙ АПОКАЛИПСИС. 💥🌋"
                ],
                default: [
                    "Добро пожаловать в цифровой ад. Ваши стихи? 🔥💾",
                    "Тёмная сторона силы ждёт ваших опытов. 🌑⚡",
                    "Введите пароль: •••• (подсказка: это 'хаос') 🔐👾"
                ]
            },
            light: {
                green: ["Прекрасный ритм! 🌸", "Муза улыбается! 😊", "Идеально! Продолжайте творить! ✨"],
                yellow: ["Можно лучше, но уже неплохо 🌼", "Маленькие огрехи, но душа есть! 💛", "Почти получилось! Попробуйте ещё раз 🌈"],
                red: ["Ой, что-то разладилось... 🌧️", "Похоже, ритм заблудился 🐾", "Давайте попробуем ещё разок? 🌱"],
                default: ["Светлый режим. Творите с удовольствием! ☀️"]
            }
        };

        const PLACEHOLDERS = {
            dark: ["Твои мрачные строки ждут... ", "Готовься к ритмическому апокалипсису...", "Слова должны гореть в аду плохого ритма...", "Строки-зомби ищут мозги..."],
            light: ["Начни писать солнечные стихи...", "Лепестки слов ждут своего цветка...", "Строки должны пахнуть свежестью...", "Пиши, будто рисуешь радугу...️"]
        };

        const dynamicTitles = {
            dark: ["Терминатор Свободного Стиха 🤖🔫", "Укротитель Слогов 😈", "Злой Светофорчик 🚦😈", "Слого-Мясорубка ⚙️🥩"],
            light: ["⚪ Добрый Светофорчик", "🌞 Стихотворный Рассвет", "🦋 Муза в Полете", "🧚‍♂️ Фея Гармонии"]
        };

        function getRandomElement(arr) {
            return arr && arr.length ? arr[Math.floor(Math.random() * arr.length)] : "";
        }

        function resetTrafficLights() {
            lightRed.classList.remove('active');
            lightYellow.classList.remove('active');
            lightGreen.classList.remove('active');
            const isDark = document.body.classList.contains('dark-theme');
            trafficLightCommentDiv.textContent = getRandomElement(isDark ? comments.dark.default : comments.light.default);
        }

        function countSyllablesInLine(line) {
            let count = 0;
            for (let char of line.toLowerCase()) {
                if (vowels.includes(char)) count++;
            }
            return count || (line.trim().length > 0 ? 1 : 0);
        }

        // --- Основная логика: Переключение между Редактором и Результатом ---
        function toggleMode() {
            hapticFeedback('medium');
            
            if (isEditMode) {
                const text = textArea.value;
                if (!text.trim()) {
                    tg.showAlert ? tg.showAlert("Сначала напишите что-нибудь!") : alert("Сначала напишите что-нибудь!");
                    return;
                }

                const lines = text.split('\n');
                let html = "";
                let counts = [];

                lines.forEach(line => {
                    const count = countSyllablesInLine(line);
                    if (line.trim() !== "" || count > 0) counts.push(count);
                    
                    if (line.trim() === "" && count === 0) {
                        html += `<div class="result-line" style="min-height: 1.5em;"></div>`;
                    } else {
                        html += `<div class="result-line"><span class="line-text">${line}</span><span class="syllable-count">${count}</span></div>`;
                    }
                });

                resultDisplay.innerHTML = html;
                textArea.style.display = 'none';
                resultDisplay.style.display = 'block';
                
                updateTrafficLight(counts);
                
                countButton.textContent = "✏️ ИСПРАВИТЬ";
                isEditMode = false;

            } else {
                textArea.style.display = 'block';
                resultDisplay.style.display = 'none';
                resetTrafficLights();
                
                const isDark = document.body.classList.contains('dark-theme');
                countButton.textContent = isDark ? countButton.dataset.dark : countButton.dataset.light;
                isEditMode = true;
            }
        }

        function updateTrafficLight(syllableCounts) {
            if (syllableCounts.length === 0) return resetTrafficLights();

            const isDark = document.body.classList.contains('dark-theme');
            const strictness = isDark ? STRICTNESS_LEVELS.dark : STRICTNESS_LEVELS.light;
            const commentsSet = isDark ? comments.dark : comments.light;

            const dominantCount = getDominantSyllableCount(syllableCounts);
            let yellowWarnings = 0, redAlerts = 0;

            if (dominantCount === null && syllableCounts.length > 1) {
                redAlerts = syllableCounts.length;
            } else if (dominantCount !== null) {
                for (let count of syllableCounts) {
                    const deviation = Math.abs(count - dominantCount);
                    if (deviation >= strictness.redDeviation) redAlerts++;
                    else if (deviation >= strictness.yellowDeviation) yellowWarnings++;
                }
            }

            if (redAlerts >= strictness.redThreshold) {
                lightRed.classList.add('active');
                trafficLightCommentDiv.textContent = getRandomElement(commentsSet.red);
                hapticFeedback('heavy');
            } else if (yellowWarnings >= strictness.yellowThreshold) {
                lightYellow.classList.add('active');
                trafficLightCommentDiv.textContent = getRandomElement(commentsSet.yellow);
                hapticFeedback('medium');
            } else {
                lightGreen.classList.add('active');
                trafficLightCommentDiv.textContent = getRandomElement(commentsSet.green);
                hapticFeedback('light');
            }
        }

        function getDominantSyllableCount(counts) {
            if (!counts || counts.length === 0) return null;
            if (counts.length === 1) return counts[0];

            const map = new Map();
            let maxFreq = 0, dominant = null;

            for (let c of counts) {
                if (c === 0 && counts.length > 1) continue; 
                map.set(c, (map.get(c) || 0) + 1);
            }
            if (Array.from(map.keys()).every(k => k === 0)) return 0;

            for (let [c, freq] of map) {
                if (c === 0 && map.size > 1) continue; 
                if (freq > maxFreq) { maxFreq = freq; dominant = c; } 
                else if (freq === maxFreq && (dominant === null || c > dominant)) dominant = c;
            }
            if (maxFreq <= counts.length / 2 && new Set(counts.filter(c => c > 0)).size > 2) return null;
            return dominant;
        }

        function clearFields() {
            hapticFeedback('light');
            textArea.value = "";
            if (!isEditMode) toggleMode(); 
            resetTrafficLights();
        }

        // --- НАДЕЖНОЕ СОХРАНЕНИЕ (TELEGRAM CLOUD STORAGE + LOCAL STORAGE) ---
        const STORAGE_KEY = "savedPoemsApp";
        const MAX_POEMS = 10; 

        // Функция сохранения
        function savePoem() {
            hapticFeedback('success');
            const poem = textArea.value.trim();
            
            if (!poem) {
                if (tg.showAlert) tg.showAlert("Нечего сохранять — поле пустое!");
                else alert("Нечего сохранять!");
                return;
            }

            trafficLightCommentDiv.textContent = "Сохраняем... ⏳";

            // Читаем текущие стихи
            loadData((poems) => {
                // Проверка на дубликаты
                if (poems.includes(poem)) {
                    trafficLightCommentDiv.textContent = "Этот стих уже есть в архиве! 🗄️";
                    return;
                }

                // Добавляем новый стих в начало
                poems.unshift(poem);
                if (poems.length > MAX_POEMS) poems = poems.slice(0, MAX_POEMS);

                // Сохраняем обновленный массив
                saveData(poems, () => {
                    trafficLightCommentDiv.textContent = "Стих успешно сохранен! ☁️✅";
                    renderSavedPoems(poems);
                    setTimeout(() => {
                        if(isEditMode) resetTrafficLights();
                    }, 2000);
                });
            });
        }

        // Функция загрузки списка
        function loadSavedPoems() {
            loadData((poems) => {
                renderSavedPoems(poems);
            });
        }

        // Универсальная функция чтения (Облако ТГ или Браузер)
        function loadData(callback) {
            if (tg.CloudStorage && tg.isVersionAtLeast && tg.isVersionAtLeast("6.9")) {
                tg.CloudStorage.getItem(STORAGE_KEY, (err, val) => {
                    if (err) {
                        console.error("TG Cloud Read Error:", err);
                        // Фолбэк на localStorage при ошибке облака
                        fallbackLocalLoad(callback);
                    } else {
                        let data = [];
                        if (val) {
                            try { data = JSON.parse(val); } catch(e) {}
                        }
                        callback(data);
                    }
                });
            } else {
                fallbackLocalLoad(callback);
            }
        }

        function fallbackLocalLoad(callback) {
            let data = [];
            try {
                const val = localStorage.getItem(STORAGE_KEY);
                if (val) data = JSON.parse(val);
            } catch(e) {}
            callback(data);
        }

        // Универсальная функция записи (Облако ТГ или Браузер)
        function saveData(poemsArray, onSuccess) {
            const dataString = JSON.stringify(poemsArray);

            if (tg.CloudStorage && tg.isVersionAtLeast && tg.isVersionAtLeast("6.9")) {
                tg.CloudStorage.setItem(STORAGE_KEY, dataString, (err, success) => {
                    if (err) {
                        if (tg.showAlert) tg.showAlert("Ошибка облака ТГ: " + err);
                        // Если облако не сработало, пишем локально
                        fallbackLocalSave(dataString, onSuccess);
                    } else {
                        onSuccess();
                    }
                });
            } else {
                fallbackLocalSave(dataString, onSuccess);
            }
        }

        function fallbackLocalSave(dataString, onSuccess) {
            try {
                localStorage.setItem(STORAGE_KEY, dataString);
                onSuccess();
            } catch(e) {
                if (tg.showAlert) tg.showAlert("Память устройства переполнена!");
            }
        }

        // Отрисовка списка
        function renderSavedPoems(poems) {
            savedPoemsList.innerHTML = ""; 
            poems.forEach((poem, index) => {
                const li = document.createElement("li");
                const preview = poem.length > 25 ? poem.substring(0, 25) + "..." : poem;
                li.innerHTML = `<span>${preview.replace(/\n/g, ' ')}</span> 
                                <div>
                                    <button onclick="loadPoem(${index})" title="Загрузить">📖</button>
                                    <button onclick="deletePoem(${index})" title="Удалить">🗑️</button>
                                </div>`;
                savedPoemsList.appendChild(li);
            });
        }

        // Загрузка стиха в редактор
        window.loadPoem = function(index) {
            hapticFeedback('light');
            loadData((poems) => {
                if (poems[index]) {
                    textArea.value = poems[index];
                    if (!isEditMode) toggleMode(); 
                }
            });
        }

        // Удаление стиха
        window.deletePoem = function(index) {
            hapticFeedback('warning');
            
            const executeDelete = () => {
                loadData((poems) => {
                    poems.splice(index, 1);
                    saveData(poems, () => {
                        renderSavedPoems(poems);
                    });
                });
            };

            if (tg.showConfirm) {
                tg.showConfirm("Удалить это стихотворение из архива?", (res) => {
                    if(res) executeDelete();
                });
            } else {
                if(confirm("Удалить это стихотворение из архива?")) executeDelete();
            }
        }

        // --- Переключение тем вручную ---
        document.getElementById('trafficLightContainer').addEventListener('click', () => {
            hapticFeedback('rigid');
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
            updateUIForTheme();
            
            lightRed.classList.add('active'); lightYellow.classList.add('active'); lightGreen.classList.add('active');
            setTimeout(() => {
                if (!isEditMode) {
                    isEditMode = true; 
                    toggleMode();
                } else {
                    resetTrafficLights();
                }
            }, 500);
        });

        function updateUIForTheme() {
            const isDark = document.body.classList.contains('dark-theme');
            const theme = isDark ? 'dark' : 'light';
            
            mainPageTitleElement.style.opacity = 0;
            setTimeout(() => {
                mainPageTitleElement.textContent = getRandomElement(dynamicTitles[theme]);
                mainPageTitleElement.style.opacity = 1;
            }, 150);

            textArea.placeholder = getRandomElement(PLACEHOLDERS[theme]);

            clearButton.textContent = isDark ? "В ТОПКУ 🔥" : "Очистить 🗑️";
            saveButton.textContent = isDark ? "В АРХИВ 🗄️" : "Сохранить 💾";
            if (isEditMode) {
                countButton.textContent = isDark ? countButton.dataset.dark : countButton.dataset.light;
            }
        }

        // --- Инициализация при загрузке ---
        document.addEventListener('DOMContentLoaded', () => {
            syncTelegramTheme(); 
            updateUIForTheme();
            loadSavedPoems();
            resetTrafficLights();
        });

        countButton.addEventListener('click', toggleMode);
        clearButton.addEventListener('click', clearFields);
        saveButton.addEventListener('click', savePoem);

    </script>
</body>
</html>
